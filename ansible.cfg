[defaults]
inventory = ./inventory/hosts.ini
host_key_checking = False
retry_files_enabled = False
# Built-in default stdout callback (no extra collection needed). For prettier
# YAML output you may set: stdout_callback = community.general.yaml
# (requires the community.general collection to be installed).
stdout_callback = default
# Where the check_point.mgmt collection is installed (galaxy default also works).
collections_path = ./collections:~/.ansible/collections

[persistent_connection]
# Smart-1 Cloud API calls can be slow on large batches; give httpapi room.
command_timeout = 120
connect_timeout = 60
