---
# ---------------------------------------------------------------------------
# Shared variables for all Firepower -> Check Point playbooks.
# Lives in inventory/group_vars/ so Ansible auto-loads it alongside the inventory.
# ---------------------------------------------------------------------------

# --- Smart-1 Cloud connection -------------------------------------------------
# The connection details (tenant host, API key, cloud management id) live in
# inventory/hosts.ini -- edit them there on your local clone. (For stronger
# hardening you can instead put ansible_api_key and ansible_cloud_mgmt_id in an
# encrypted group_vars/all.vault.yml.)

# --- Target policy / package --------------------------------------------------
# Access policy: each converted Cisco ACL becomes its OWN policy package (named
# after the ACL); rules go into that package's "<package> Network" layer. Choose
# which ACLs to convert at parse time:  ./2_parse.sh <config> --acls NAME1,NAME2
# (default: the ACL bound 'access-group <name> global').
#
# Policy package that migrated NAT rules are written into.
cp_nat_package: "Standard"
# Track setting for every migrated access rule (Log / None / Extended Log / Detailed Log).
cp_rule_track: "Log"

# --- Defaults applied to created objects -------------------------------------
cp_default_color: "black"

# --- Publish behaviour --------------------------------------------------------
# When true, each STAGE publishes at its end (objects, then groups, then ...).
# Per-stage publishing matters for LARGE configs: the Check Point API session
# times out (~10 min, and the Ansible plugin cannot extend it), so a long single
# unpublished run rolls into multiple sessions and changes get split. Publishing
# per stage commits each stage well within the window.
#
# true (default): publish per stage -- reliable at any size, and later stages can
#   see earlier objects (no "object not found" cascades). Review the published
#   result in SmartConsole; undo.yml can roll it back.
# false: create everything but DON'T publish, for a pre-publish review. Only
#   reliable for SMALL configs that finish within one ~10-min session window;
#   larger runs roll into multiple sessions and references fail "not found".
#
# Check Point sessions are private until published: unpublished changes are only
# visible within the session that made them (Manage & Settings > Sessions; you may
# need to take the session over if you're a different admin than the API key).
cp_publish: true

# --- NAT: hide behind firewall (PAT) ------------------------------------------
# Cisco "nat ... dynamic interface" (PAT / hide behind the firewall IP) is NOT
# migrated as a manual NAT rule. Its Check Point equivalent is the gateway's
# automatic hide-NAT: on the gateway object's NAT tab, enable "Hide internal
# networks behind the Gateway's external IP". The parser flags these as
# auto-handled (see reports/parse_summary.md) so you enable that one setting
# instead of importing per-rule hide NAT. No configuration is needed here.

# --- Selective apply / undo ---------------------------------------------------
# Restrict which items are acted on (used by all playbooks, handy for undo.yml).
# select_names: if non-empty, ONLY items whose name is in this list are touched.
# skip_names:   items whose name is in this list are always skipped.
# Override on the CLI, e.g.:  ./3_apply.sh undo -e '{"select_names":["HOST_web01"]}'
select_names: []
skip_names: []

# --- Predefined service used for ACL 'permit icmp' lines ----------------------
# The parser maps bare 'icmp' ACL entries to this Check Point service name.
# Verify it exists on your management (common choices: icmp-proto, echo-request).
cp_icmp_service: "icmp-proto"
