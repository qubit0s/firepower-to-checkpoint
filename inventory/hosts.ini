# ===========================================================================
# Check Point management connection. Works for BOTH:
#   * Smart-1 Cloud
#   * Smart-1 / Security Management on-premise (open server or appliance)
#
# Edit the host line and UNCOMMENT exactly ONE of the auth blocks (A/B/C) below.
# This file is git-ignored once you fill it in -- keep secrets out of commits.
# ===========================================================================

[checkpoint]
# One management server / tenant:
#   Smart-1 Cloud : <tenant>.maas.checkpoint.com
#   On-premise    : <mgmt-ip-or-hostname>
your-mgmt-host-or-tenant

[checkpoint:vars]
ansible_network_os=check_point.mgmt.checkpoint
ansible_httpapi_use_ssl=True
ansible_httpapi_validate_certs=False

# ---------------------------------------------------------------------------
# Choose ONE authentication block:
# ---------------------------------------------------------------------------

# (A) Smart-1 Cloud  -- API key + cloud management id
#     Infinity Portal > Global Settings > API Keys > service "Smart-1 Cloud"
#     cloud id: Smart-1 Cloud > Settings > General
# ansible_api_key=<your-smart-1-cloud-api-key>
# ansible_cloud_mgmt_id=<your-cloud-management-id>

# (B) On-premise -- API key
#     SmartConsole > Manage & Settings > Permissions & Administrators >
#     Administrators > New > Authentication Method: API Key
# ansible_api_key=<your-api-key>

# (C) On-premise -- username / password
# ansible_user=<admin-user>
# ansible_password=<password>
