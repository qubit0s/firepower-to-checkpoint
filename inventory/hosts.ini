# ===========================================================================
# Smart-1 Cloud connection. Edit the THREE values marked <...> below.
# This file is git-ignored, so your API key is never committed.
#
# Where to get each value (Check Point Infinity Portal):
#  1. Tenant host  -> Smart-1 Cloud > Settings > General  (<tenant>.maas.checkpoint.com)
#  2. API key      -> Infinity Portal > (account menu) > Global Settings > API Keys >
#                     New > service "Smart-1 Cloud" > Create  (save the key immediately)
#  3. cloud_mgmt_id-> Smart-1 Cloud > Settings > General
# ===========================================================================

[checkpoint]
<tenant>.maas.checkpoint.com

[checkpoint:vars]
ansible_network_os=check_point.mgmt.checkpoint
ansible_httpapi_use_ssl=True
ansible_httpapi_validate_certs=False
ansible_api_key=<your-smart-1-cloud-api-key>
ansible_cloud_mgmt_id=<your-cloud-management-id>
