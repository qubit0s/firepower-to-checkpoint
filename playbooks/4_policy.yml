---
# ===========================================================================
# Stage 4: access policy (own session).
# Consumes ../vars/4_policy.yml. Publishes only when cp_publish=true.
# Rules go into cp_access_layer in ACL order; referenced objects/services must
# already exist (published if run standalone, or same-session via site.yml).
# Run:  ./3_apply.sh policy   (or ansible-playbook playbooks/4_policy.yml)
# ===========================================================================
- name: "FTD -> Check Point :: access policy"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/4_policy.yml
  tasks:
    - name: Import access rules
      ansible.builtin.include_tasks: tasks/policy.yml

    - name: Publish session
      check_point.mgmt.cp_mgmt_publish:
      when: cp_publish | bool
