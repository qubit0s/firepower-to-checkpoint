---
# ===========================================================================
# Stage 5: NAT rules (own session).
# Consumes ../vars/5_nat.yml. Publishes only when cp_publish=true.
# On R81+ cp_mgmt_nat_rule requires a unique name, so rules are keyed by name
# (re-running updates rather than appends); position controls ordering only.
# "Hide behind interface" (Cisco PAT) maps to hide-NAT behind cp_hide_behind_object.
# Run:  ./3_apply.sh nat   (or ansible-playbook playbooks/5_nat.yml)
# ===========================================================================
- name: "FTD -> Check Point :: NAT rules"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/5_nat.yml
  tasks:
    - name: Import NAT rules
      ansible.builtin.include_tasks: tasks/nat.yml

    - name: Publish session
      check_point.mgmt.cp_mgmt_publish:
      when: cp_publish | bool
