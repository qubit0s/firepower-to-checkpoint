---
# Stage tasks: access policy. Each converted Cisco ACL becomes its own Check
# Point policy package. add-package with access: true auto-creates the package's
# default access layer, named exactly "<package> Network" -- that is the layer the
# rules target. (The management API does NOT accept an access-layers parameter on
# add-package; it is only valid on set-package, so we rely on the auto-created
# layer rather than passing access_layers here.)
# Consumes ../vars/4_policy.yml. Does not publish.

- name: Create policy packages (one per Cisco ACL; auto-creates "<package> Network" layer)
  check_point.mgmt.cp_mgmt_package:
    name: "{{ item.name }}"
    access: true
    threat_prevention: false
    comments: "{{ item.comments | default('') }}"
    color: "{{ cp_default_color }}"
    state: present
    ignore_warnings: true
  loop: "{{ cp_packages | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: r_packages
  ignore_errors: true

# The auto-created "<package> Network" layer is L3/L4 only by default. Some
# migrated rules reference Check Point built-ins that resolve to Application/Site
# objects (e.g. rdp, sip, h323), which makes the publish validator reject the
# layer ("'Service & Applications' column cannot contain applications until the
# 'Applications & URL Filtering' option has been selected in the layer's
# properties"). Enable the blade so those rules validate. Controlled by
# cp_layer_apps_url_filtering (default true); set false to keep layers L3/L4.
- name: "Enable Applications & URL Filtering on each package's layer"
  check_point.mgmt.cp_mgmt_access_layer:
    name: "{{ item.name }} Network"
    applications_and_url_filtering: true
    state: present
    ignore_warnings: true
  loop: "{{ cp_packages | default([]) }}"
  loop_control:
    label: "{{ item.name }} Network"
  register: r_layers
  ignore_errors: true
  when: cp_layer_apps_url_filtering | default(true) | bool

- name: Create access rules (in ACL order, into each package's layer)
  check_point.mgmt.cp_mgmt_access_rule:
    layer: "{{ item.layer }}"
    name: "{{ item.name }}"
    # Append to the bottom of the explicit rulebase. Looping in ACL order with
    # position: bottom preserves order and keeps rules above the implicit cleanup
    # rule. (A numeric position climbs past the layer's rule count -> "Invalid
    # value [N], should be [1-M]".)
    position: bottom
    action: "{{ item.action }}"
    source: "{{ item.source }}"
    destination: "{{ item.destination }}"
    # Map the placeholder icmp service name to the configured one.
    service: "{{ item.service | map('replace', 'icmp-proto', cp_icmp_service) | list }}"
    track:
      type: "{{ cp_rule_track | default('Log') }}"
      # 'Session' granularity is mandatory when a rule carries an application or
      # content-type with Track=Log; harmless (one log per session) otherwise.
      per_session: "{{ cp_rule_track_per_session | default(true) | bool }}"
    enabled: "{{ item.enabled | default(true) }}"
    comments: "{{ item.comments | default('') }}"
    state: present
    ignore_warnings: true
  loop: "{{ cp_access_rules | default([]) }}"
  loop_control:
    label: "{{ item.name }} ({{ item.action }})"
  register: r_rules
  ignore_errors: true

- name: Record access rules that failed to import
  ansible.builtin.include_tasks: record_not_imported.yml
  vars:
    stage_name: "4_policy"
    task_results:
      - "{{ r_packages }}"
      - "{{ r_layers | default({}) }}"
      - "{{ r_rules }}"

- name: "Publish session after this stage (when cp_publish=true)"
  check_point.mgmt.cp_mgmt_publish:
  when: cp_publish | bool
