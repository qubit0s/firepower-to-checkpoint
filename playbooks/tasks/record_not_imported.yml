---
# ===========================================================================
# Reusable recorder: writes a per-stage report of items that FAILED to import
# into Check Point, with the API error for each.
#
# Caller passes:
#   stage_name   - short stage label (e.g. "1_objects")
#   task_results - list of registered loop results from the stage's create tasks
#
# Each create task in the stage must use `register:` and `ignore_errors: true`
# so the run continues and failures are collected here instead of aborting.
# Output: reports/<stage_name>_not_imported.yml  (always written, even if empty).
# ===========================================================================

- name: "Report: reset failure accumulator"
  ansible.builtin.set_fact:
    not_imported: []

- name: "Report: collect failed items"
  ansible.builtin.set_fact:
    not_imported: >-
      {{ not_imported + [ {
           'object': (rec.item.name | default(rec.invocation.module_args.name) | default('?')),
           'error':  (rec.msg | default(rec.exception) | default('failed')) | trim
         } ] }}
  loop: >-
    {{ task_results | selectattr('results', 'defined') | map(attribute='results') | flatten
       | selectattr('failed', 'defined') | selectattr('failed') | list }}
  loop_control:
    loop_var: rec
    label: "{{ rec.item.name | default('?') }}"

- name: "Report: ensure reports directory exists"
  delegate_to: localhost
  run_once: true
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports"
    state: directory
    mode: "0755"

- name: "Report: write not-imported file for {{ stage_name }}"
  delegate_to: localhost
  run_once: true
  ansible.builtin.copy:
    mode: "0644"
    dest: "{{ playbook_dir }}/../reports/{{ stage_name }}_not_imported.yml"
    content: |
      # AUTO-GENERATED on apply. Items that FAILED to import into Check Point
      # during stage '{{ stage_name }}', with the reason. Empty list = all imported.
      # Generated {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
      {{ {'stage': stage_name, 'failed_count': not_imported | length, 'not_imported': not_imported} | to_nice_yaml(indent=2) }}

- name: "Report: summarise failures for {{ stage_name }}"
  ansible.builtin.debug:
    msg: >-
      {{ stage_name }}: {{ not_imported | length }} item(s) failed to import
      -> reports/{{ stage_name }}_not_imported.yml
  when: not_imported | length > 0
