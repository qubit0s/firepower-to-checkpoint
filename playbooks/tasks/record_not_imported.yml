---
# ===========================================================================
# Reusable recorder: writes a per-stage report of items that FAILED to import
# into Check Point, with the API error for each.
#
# Caller passes:
#   stage_name    - short stage label (e.g. "1_objects" or "undo_nat")
#   task_results  - list of registered loop results from the stage's tasks
#   report_action - optional verb for wording: "import" (default) or "delete"
#
# Each task must use `register:` and `ignore_errors: true` so the run continues
# and failures are collected here instead of aborting.
# Output: reports/<stage_name>_not_imported.yml  (always written, even if empty).
# ===========================================================================

- name: "Report: reset failure accumulator"
  ansible.builtin.set_fact:
    not_imported: []

- name: "Report: collect failed items"
  ansible.builtin.set_fact:
    not_imported: >-
      {{ not_imported + [ {
           'object': (rec.item.name | default(rec.invocation.module_args.name) | default('?')),
           'error':  (rec.msg | default(rec.exception) | default('failed')) | trim
         } ] }}
  loop: >-
    {{ task_results | selectattr('results', 'defined') | map(attribute='results') | flatten
       | selectattr('failed', 'defined') | selectattr('failed') | list }}
  loop_control:
    loop_var: rec
    label: "{{ rec.item.name | default('?') }}"

- name: "Report: compute counts"
  ansible.builtin.set_fact:
    stage_attempted: >-
      {{ task_results | selectattr('results', 'defined') | map(attribute='results')
         | flatten | rejectattr('skipped', 'defined') | list | length }}

- name: "Report: build payload"
  ansible.builtin.set_fact:
    report_payload:
      stage: "{{ stage_name }}"
      action: "{{ report_action | default('import') }}"
      processed: "{{ stage_attempted | int }}"
      ok: "{{ (stage_attempted | int) - (not_imported | length) }}"
      failed_count: "{{ not_imported | length }}"
      not_imported: "{{ not_imported }}"

- name: "Report: accumulate stage stats"
  ansible.builtin.set_fact:
    apply_stats: >-
      {{ apply_stats | default([]) + [{
           'stage': stage_name,
           'action': report_action | default('import'),
           'processed': stage_attempted | int,
           'ok': (stage_attempted | int) - (not_imported | length),
           'failed': not_imported | length}] }}

- name: "Report: ensure reports directory exists"
  delegate_to: localhost
  run_once: true
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports"
    state: directory
    mode: "0755"

- name: "Report: write report file for {{ stage_name }}"
  delegate_to: localhost
  run_once: true
  ansible.builtin.copy:
    mode: "0644"
    dest: "{{ playbook_dir }}/../reports/{{ stage_name }}_not_imported.yml"
    content: |
      # AUTO-GENERATED. Items that FAILED to {{ report_action | default('import') }} on
      # Check Point during stage '{{ stage_name }}', with the reason. Empty = all OK.
      # Generated {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
      {{ report_payload | to_nice_yaml(indent=2) }}

- name: "Report: stage summary for {{ stage_name }}"
  ansible.builtin.debug:
    msg: >-
      {{ stage_name }}: processed={{ stage_attempted | int }}
      ok={{ (stage_attempted | int) - (not_imported | length) }}
      failed={{ not_imported | length }}
      {{ '-> reports/' ~ stage_name ~ '_not_imported.yml' if not_imported | length > 0 else '' }}
