---
# ===========================================================================
# Stage 2: network object-groups (own session).
# Consumes ../vars/2_object_groups.yml. Publishes only when cp_publish=true.
# Members reference objects from stage 1 -- those must already be PUBLISHED if
# you run this stage in its own session. For an unpublished full run use site.yml.
# Run:  ./3_apply.sh object-groups   (or ansible-playbook playbooks/2_object-groups.yml)
# ===========================================================================
- name: "FTD -> Check Point :: network object-groups"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/2_object_groups.yml
  tasks:
    - name: Import object-groups
      ansible.builtin.include_tasks: tasks/object-groups.yml

    - name: Write apply summary
      ansible.builtin.include_tasks: tasks/write_apply_summary.yml
