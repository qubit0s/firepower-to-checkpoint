---
# ===========================================================================
# Playbook: object-groups
# Creates Check Point network groups migrated from Cisco `object-group network`.
# Members reference objects created by the `objects` playbook (and nested groups),
# so run `objects.yml` BEFORE this playbook.
# Consumes: ../vars/2_object_groups.yml
# Run:  ansible-playbook playbooks/object-groups.yml
# ===========================================================================
- name: "FTD -> Check Point :: network object-groups"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/2_object_groups.yml

  tasks:
    # Pass 1: create every group empty first, so that groups which nest other
    # groups (group-object) resolve regardless of definition order.
    - name: Ensure groups exist (empty)
      check_point.mgmt.cp_mgmt_group:
        name: "{{ item.name }}"
        comments: "{{ item.comments | default('') }}"
        color: "{{ cp_default_color }}"
        state: present
        ignore_warnings: true
      loop: "{{ cp_network_groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: r_groups_create
      ignore_errors: true

    # Pass 2: set membership now that all referenced names exist.
    - name: Populate group membership
      check_point.mgmt.cp_mgmt_group:
        name: "{{ item.name }}"
        members: "{{ item.members }}"
        comments: "{{ item.comments | default('') }}"
        state: present
        ignore_warnings: true
      loop: "{{ cp_network_groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.members | length > 0
      register: r_groups_members
      ignore_errors: true

    - name: Record items that failed to import
      ansible.builtin.include_tasks: tasks/record_not_imported.yml
      vars:
        stage_name: "2_object-groups"
        task_results:
          - "{{ r_groups_create }}"
          - "{{ r_groups_members }}"

    - name: Publish session
      check_point.mgmt.cp_mgmt_publish:
      when: cp_publish | bool
