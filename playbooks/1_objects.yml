---
# ===========================================================================
# Playbook: objects
# Creates Check Point network objects migrated from Cisco FTD `object network`:
#   hosts, networks, address-ranges, dns-domains (FQDN).
# Consumes: ../vars/1_objects.yml   (generated by parser/ftd_to_cp.py)
# Run:  ansible-playbook playbooks/objects.yml
# ===========================================================================
- name: "FTD -> Check Point :: network objects"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/1_objects.yml

  tasks:
    - name: Create host objects
      check_point.mgmt.cp_mgmt_host:
        name: "{{ item.name }}"
        ip_address: "{{ item.ip_address }}"
        comments: "{{ item.comments | default('') }}"
        color: "{{ cp_default_color }}"
        state: present
        ignore_warnings: true
      loop: "{{ cp_hosts | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: r_hosts
      ignore_errors: true

    - name: Create network objects
      check_point.mgmt.cp_mgmt_network:
        name: "{{ item.name }}"
        subnet: "{{ item.subnet }}"
        mask_length: "{{ item.mask_length }}"
        comments: "{{ item.comments | default('') }}"
        color: "{{ cp_default_color }}"
        state: present
        ignore_warnings: true
      loop: "{{ cp_networks | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: r_networks
      ignore_errors: true

    - name: Create address-range objects
      check_point.mgmt.cp_mgmt_address_range:
        name: "{{ item.name }}"
        ip_address_first: "{{ item.ip_address_first }}"
        ip_address_last: "{{ item.ip_address_last }}"
        comments: "{{ item.comments | default('') }}"
        color: "{{ cp_default_color }}"
        state: present
        ignore_warnings: true
      loop: "{{ cp_address_ranges | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: r_ranges
      ignore_errors: true

    - name: Create dns-domain objects (from FQDN network objects)
      check_point.mgmt.cp_mgmt_dns_domain:
        name: "{{ item.name }}"
        is_sub_domain: false
        comments: "{{ item.comments | default('') }}"
        state: present
        ignore_warnings: true
      loop: "{{ cp_dns_domains | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: r_dns
      ignore_errors: true

    - name: Record items that failed to import
      ansible.builtin.include_tasks: tasks/record_not_imported.yml
      vars:
        stage_name: "1_objects"
        task_results:
          - "{{ r_hosts }}"
          - "{{ r_networks }}"
          - "{{ r_ranges }}"
          - "{{ r_dns }}"

    - name: Publish session
      check_point.mgmt.cp_mgmt_publish:
      when: cp_publish | bool
