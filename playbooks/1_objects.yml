---
# ===========================================================================
# Stage 1: network objects (own session).
# Consumes ../vars/1_objects.yml. Publishes only when cp_publish=true.
# Run:  ./3_apply.sh objects   (or ansible-playbook playbooks/1_objects.yml)
#
# NOTE: with cp_publish=false (default) these objects stay UNPUBLISHED and are
# only visible to this session -- a separately-run later stage won't see them.
# For an unpublished full migration use site.yml (single session). See README.
# ===========================================================================
- name: "FTD -> Check Point :: network objects"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/1_objects.yml
  tasks:
    - name: Import network objects
      ansible.builtin.include_tasks: tasks/objects.yml

    - name: Write apply summary
      ansible.builtin.include_tasks: tasks/write_apply_summary.yml
