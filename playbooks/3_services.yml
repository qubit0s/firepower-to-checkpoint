---
# ===========================================================================
# Stage 3: services (TCP/UDP/Other) and service-groups (own session).
# Consumes ../vars/3_services.yml. Publishes only when cp_publish=true.
# Run:  ./3_apply.sh services   (or ansible-playbook playbooks/3_services.yml)
# ===========================================================================
- name: "FTD -> Check Point :: services"
  hosts: checkpoint
  connection: httpapi
  gather_facts: false
  vars_files:
    - ../vars/3_services.yml
  tasks:
    - name: Import services
      ansible.builtin.include_tasks: tasks/services.yml

    - name: Write apply summary
      ansible.builtin.include_tasks: tasks/write_apply_summary.yml

    - name: Publish session
      check_point.mgmt.cp_mgmt_publish:
      when: cp_publish | bool
